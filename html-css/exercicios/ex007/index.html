<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens que se adaptam sozinhas</title>
</head>
<body>
    <h1>Imagens Dinamicas</h1>
    <p>Veja como as imagens se adaptam ao tamanho da tela.</p>
    <picture>
        <source media="(max-width: 750px)" srcset="img/Pequena.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="img/media.png" type="image/png">
        <img src="img/Grande.png" alt="Imagem Flexivel">
    </picture>   

    <h1>Adicionando audios</h1>
    <audio src="midia/song.mp3.mp3" controls></audio>
</body>
</html>
